<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACI Electrical — Price Positioning Index</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

[data-theme="light"] {
  --bg-a: #b8d4e8; --bg-b: #ddeaf8; --bg-c: #c5ddf2;
  --glass-bg:    rgba(255,255,255,0.42);
  --glass-bg-h:  rgba(255,255,255,0.68);
  --glass-border:rgba(255,255,255,0.75);
  --glass-border-h:rgba(255,255,255,0.95);
  --glass-shadow:rgba(21,96,130,0.16);
  --glass-shine: rgba(255,255,255,0.60);
  --header-bg:   rgba(220,238,252,0.55);
  --text:        #0b1e2d; --text-sec:#2e4f65; --text-muted:#6a8da6;
  --accent:#156082; --accent-lt:#6FAEFE;
  --toggle-bg:   rgba(21,96,130,0.12);
  --search-bg:   rgba(255,255,255,0.55);
  --orb1: rgba(21,96,130,0.20); --orb2: rgba(111,174,254,0.14);
  --cursor-light:rgba(255,255,255,0.55);
  --freq-bg: rgba(255,255,255,0.38);
}
[data-theme="dark"] {
  --bg-a: #030d16; --bg-b: #051525; --bg-c: #040f1c;
  --glass-bg:    rgba(255,255,255,0.055);
  --glass-bg-h:  rgba(255,255,255,0.11);
  --glass-border:rgba(255,255,255,0.10);
  --glass-border-h:rgba(255,255,255,0.22);
  --glass-shadow:rgba(0,0,0,0.55);
  --glass-shine: rgba(255,255,255,0.08);
  --header-bg:   rgba(3,13,25,0.60);
  --text:#e2f0fa; --text-sec:#85b4cc; --text-muted:#4a7a9b;
  --accent:#6FAEFE; --accent-lt:#a8d4ff;
  --toggle-bg:   rgba(111,174,254,0.12);
  --search-bg:   rgba(255,255,255,0.07);
  --orb1: rgba(111,174,254,0.10); --orb2: rgba(21,96,130,0.18);
  --cursor-light:rgba(111,174,254,0.18);
  --freq-bg: rgba(255,255,255,0.045);
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Inter','Helvetica Neue',sans-serif;
  background: linear-gradient(140deg, var(--bg-a) 0%, var(--bg-b) 50%, var(--bg-c) 100%);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background .45s, color .3s;
}

/* ── AMBIENT ORBS ── */
.orb {
  position: fixed; border-radius: 50%;
  pointer-events: none; z-index: 0;
  transition: opacity .5s;
  animation: drift 18s ease-in-out infinite alternate;
}
.orb1 {
  width:700px;height:700px;top:-200px;right:-200px;
  background: radial-gradient(circle, var(--orb1), transparent 68%);
  filter: blur(60px);
  animation-duration: 18s;
}
.orb2 {
  width:550px;height:550px;bottom:-150px;left:-120px;
  background: radial-gradient(circle, var(--orb2), transparent 68%);
  filter: blur(55px);
  animation-duration: 22s; animation-delay: -8s;
}
.orb3 {
  width:380px;height:380px;top:40%;left:40%;
  background: radial-gradient(circle, rgba(111,174,254,0.07), transparent 68%);
  filter: blur(50px);
  animation-duration: 28s; animation-delay: -14s;
}
@keyframes drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(40px,30px) scale(1.06); }
}

/* ── CURSOR GLOW ── */
#cursorGlow {
  position: fixed;
  width: 320px; height: 320px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
  background: radial-gradient(circle, var(--cursor-light) 0%, transparent 70%);
  transform: translate(-50%,-50%);
  transition: opacity .3s;
  filter: blur(8px);
  opacity: 0;
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 200;
  backdrop-filter: blur(32px) saturate(200%) brightness(1.08);
  -webkit-backdrop-filter: blur(32px) saturate(200%) brightness(1.08);
  background: var(--header-bg);
  border-bottom: 1px solid var(--glass-border);
  box-shadow: 0 4px 40px var(--glass-shadow), inset 0 1px 0 var(--glass-shine);
  transition: background .4s;
}
.header-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 36px;
  height: 66px; display: flex; align-items: center; gap: 18px;
}
.site-title { font-size: 15.5px; font-weight: 700; color: var(--text); flex-shrink:0; }
.site-title span { display:block; font-size:10px; font-weight:400; color:var(--text-muted); letter-spacing:.9px; text-transform:uppercase; margin-top:2px; }
.header-spacer { flex:1; }

/* Search */
.search-wrap { position:relative; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; }
#searchInput {
  background: var(--search-bg);
  backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: 24px; padding: 9px 36px 9px 36px;
  font-family:'Inter',sans-serif; font-size:13px; color:var(--text);
  width: 220px; outline: none;
  transition: width .25s, border-color .2s, box-shadow .2s, background .2s;
}
#searchInput:focus {
  width:280px; border-color:var(--accent);
  box-shadow: 0 0 0 3px rgba(111,174,254,0.20), 0 0 20px rgba(111,174,254,0.15);
  background: var(--glass-bg-h);
}
#searchInput::placeholder { color:var(--text-muted); }
#clearSearch {
  position:absolute; right:11px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; color:var(--text-muted);
  display:none; line-height:0; transition:color .15s; padding:2px;
}
#clearSearch:hover { color:var(--text); }

/* Theme toggle */
.theme-toggle {
  background: var(--toggle-bg);
  border: 1px solid var(--glass-border);
  border-radius: 20px; padding: 7px 14px;
  cursor: pointer; display:flex; align-items:center; gap:6px;
  font-family:'Inter',sans-serif; font-size:12px; font-weight:500; color:var(--text-sec);
  transition: background .2s, transform .15s, box-shadow .2s;
  white-space:nowrap; flex-shrink:0;
  backdrop-filter: blur(10px);
}
.theme-toggle:hover {
  background: var(--glass-bg-h); transform:scale(1.04);
  box-shadow: 0 4px 16px var(--glass-shadow);
}

/* ── MAIN ── */
main { max-width:1200px; margin:0 auto; padding:32px 36px 64px; position:relative; z-index:1; }

/* ── GLASS CARD BASE ── */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1.5px 0 var(--glass-shine), inset 0 -1px 0 rgba(0,0,0,0.04);
  transition: background .3s, border-color .3s;
}

/* ── FREQUENT ── */
#frequentSection {
  padding: 20px 24px; margin-bottom: 26px;
  display: none; border-left: 3px solid var(--accent);
  background: var(--freq-bg);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border-radius: 16px;
  border: 1px solid var(--glass-border);
  border-left: 3px solid var(--accent);
  box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1.5px 0 var(--glass-shine);
}
#frequentSection h2 { font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:1.4px; color:var(--text-muted); margin-bottom:12px; }
#frequentList { display:flex; flex-wrap:wrap; gap:8px; }
.freq-chip {
  display:inline-flex; align-items:center; gap:6px;
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 20px; padding: 6px 14px 6px 10px;
  font-size:12.5px; font-weight:500; color:var(--text);
  cursor:pointer; text-decoration:none;
  transition: background .15s, transform .15s, box-shadow .2s, border-color .15s;
  position: relative; overflow: hidden;
}
.freq-chip::before {
  content:''; position:absolute; inset:0; border-radius:20px;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  pointer-events:none;
}
.freq-chip:hover {
  background: var(--accent); color:#fff; border-color:transparent;
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 8px 24px rgba(21,96,130,0.35);
}
.freq-count { background:var(--accent); color:#fff; border-radius:10px; padding:1px 7px; font-size:10px; font-weight:700; }
.freq-chip:hover .freq-count { background:rgba(255,255,255,0.28); }

/* ── CATEGORY ── */
.cat-section { margin-bottom:24px; }
.cat-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; padding-left:2px; }
.cat-pill {
  display:inline-flex; align-items:center; gap:9px;
  padding: 6px 16px 6px 10px; border-radius:8px;
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  box-shadow: 0 2px 12px var(--glass-shadow), inset 0 1px 0 var(--glass-shine);
}
.cat-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.cat-name { font-size:12px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; }
.cat-count { font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; color:#fff; }

/* ── CARDS GRID ── */
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:11px; }

/* ── SHEET CARD ── */
.sheet-card {
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  cursor: pointer; text-decoration: none; color: inherit;
  border-radius: 16px;
  background: var(--glass-bg);
  backdrop-filter: blur(32px) saturate(200%);
  -webkit-backdrop-filter: blur(32px) saturate(200%);
  border: 1px solid var(--glass-border);
  box-shadow: 0 4px 24px var(--glass-shadow),
              inset 0 1.5px 0 var(--glass-shine),
              inset 0 -1px 0 rgba(0,0,0,0.03);
  transition: transform .22s cubic-bezier(.34,1.56,.64,1),
              box-shadow .22s ease,
              border-color .2s,
              background .2s;
  /* Tilt vars */
  --rx: 0deg; --ry: 0deg; --mx: 50%; --my: 50%;
  transform-style: preserve-3d;
  will-change: transform;
}

/* Shine overlay that follows cursor */
.sheet-card::before {
  content:'';
  position:absolute; inset:0; border-radius:16px;
  background: radial-gradient(circle at var(--mx) var(--my),
    rgba(255,255,255,0.38) 0%,
    rgba(255,255,255,0.10) 35%,
    transparent 65%);
  opacity: 0;
  transition: opacity .25s;
  pointer-events: none;
  z-index: 2;
}
/* Top edge gloss */
.sheet-card::after {
  content:'';
  position:absolute; inset:0; border-radius:16px;
  background: linear-gradient(160deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.04) 40%, transparent 70%);
  pointer-events:none; z-index:1;
}

.sheet-card:hover {
  transform: translateY(-6px) rotateX(var(--rx)) rotateY(var(--ry)) scale(1.02);
  background: var(--glass-bg-h);
  border-color: var(--glass-border-h);
  box-shadow: 0 20px 50px var(--glass-shadow),
              0 0 0 1px var(--glass-border-h),
              inset 0 2px 0 rgba(255,255,255,0.65),
              inset 0 -1px 0 rgba(0,0,0,0.05);
}
.sheet-card:hover::before { opacity: 1; }

.sheet-card:active { transform: translateY(-2px) scale(1.005); transition-duration:.1s; }

.card-accent { height:3px; flex-shrink:0; }
.card-body { padding:15px 17px 14px; display:flex; flex-direction:column; gap:10px; flex:1; position:relative; z-index:3; }
.card-title { font-size:13px; font-weight:600; color:var(--text); line-height:1.35; }
.card-footer { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.usage-badge { display:flex; align-items:center; gap:4px; font-size:10px; font-weight:500; color:var(--text-muted); }
.usage-badge.has-usage { color:var(--accent); }

.open-arrow {
  display:inline-flex; align-items:center; justify-content:center;
  width:28px; height:28px; border-radius:8px;
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  border: 1px solid var(--glass-border);
  color: var(--text-muted);
  transition: background .15s, color .15s, border-color .15s, transform .2s, box-shadow .2s;
  flex-shrink:0; position:relative; overflow:hidden;
}
.open-arrow::before {
  content:'';
  position:absolute; inset:0; border-radius:8px;
  background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 60%);
  pointer-events:none;
}
.sheet-card:hover .open-arrow {
  background: var(--cat-color, #156082);
  border-color: transparent; color: #fff;
  transform: translate(2px,-2px) scale(1.1);
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
}

/* ── SEARCH RESULTS ── */
#searchResults { display:none; }
.result-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:11px; }
#searchResultsLabel { font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:12px; }
.no-results { text-align:center; padding:60px 20px; color:var(--text-muted); font-size:14px; }
.no-results svg { margin-bottom:14px; opacity:.3; }

/* ── COLORS ── */
.gss { --cat-color:#156082; }
.acc { --cat-color:#242867; }
.lit { --cat-color:#1c6b5e; }
.fan { --cat-color:#4e6688; }
.ref { --cat-color:#7a6530; }

.cat-dot.gss { background:#156082; } .cat-dot.acc { background:#242867; }
.cat-dot.lit { background:#1c6b5e; } .cat-dot.fan { background:#4e6688; }
.cat-dot.ref { background:#7a6530; }

.cat-name.gss { color:#156082; } .cat-name.acc { color:#242867; }
.cat-name.lit { color:#1c6b5e; } .cat-name.fan { color:#4e6688; }
.cat-name.ref { color:#7a6530; }
[data-theme="dark"] .cat-name.gss { color:#6FAEFE; }
[data-theme="dark"] .cat-name.acc { color:#9491ff; }
[data-theme="dark"] .cat-name.lit { color:#5ecfb8; }
[data-theme="dark"] .cat-name.fan { color:#8bafd4; }
[data-theme="dark"] .cat-name.ref { color:#d4b76a; }

.cat-count.gss { background:#156082; } .cat-count.acc { background:#242867; }
.cat-count.lit { background:#1c6b5e; } .cat-count.fan { background:#4e6688; }
.cat-count.ref { background:#7a6530; }

.card-accent.gss { background:linear-gradient(90deg,#156082,#6FAEFE); }
.card-accent.acc { background:linear-gradient(90deg,#242867,#7a73d1); }
.card-accent.lit { background:linear-gradient(90deg,#1c6b5e,#5ecfb8); }
.card-accent.fan { background:linear-gradient(90deg,#4e6688,#8bafd4); }
.card-accent.ref { background:linear-gradient(90deg,#7a6530,#d4b76a); }

footer {
  text-align:center; padding:18px;
  font-size:11px; color:var(--text-muted);
  border-top:1px solid var(--glass-border);
  background: var(--glass-bg);
  position:relative; z-index:1;
  backdrop-filter: blur(16px);
}

@media (max-width:640px) {
  .header-inner { padding:0 16px; gap:10px; }
  main { padding:20px 14px 48px; }
  #searchInput { width:150px; } #searchInput:focus { width:190px; }
  .theme-toggle span { display:none; }
}
</style>
</head>

<header>
  <div class="header-inner">

      <div class="cards-grid" id="grid-lit"></div>

const CAT_ICONS = { gss:'🔌', acc:'⚙️', lit:'💡', fan:'🌀', ref:'📁' };
const STORAGE_KEY = 'sparkle_pp_v3';

function getUsage() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch { return {}; } }
function saveUsage(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }
function recordClick(id) { const d=getUsage(); d[id]=(d[id]||0)+1; saveUsage(d); }

// ── CURSOR LIGHT & CARD TILT ──
const glow = document.getElementById('cursorGlow');
let glowVisible = false;

document.addEventListener('mousemove', e => {
  // Global cursor glow
  glow.style.left = e.clientX + 'px';
  glow.style.top  = e.clientY + 'px';
  if (!glowVisible) { glow.style.opacity='1'; glowVisible=true; }

  // Per-card tilt + shine
  document.querySelectorAll('.sheet-card').forEach(card => {
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top  + rect.height/2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const maxDist = 260;

    if (dist < maxDist) {
      // Tilt toward cursor
      const factor = (1 - dist/maxDist) * 12;
      const rx = -(dy/rect.height) * factor;
      const ry =  (dx/rect.width)  * factor;
      // Shine position inside card
      const mx = ((e.clientX - rect.left) / rect.width  * 100).toFixed(1) + '%';
      const my = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1) + '%';
      card.style.setProperty('--rx', rx.toFixed(2)+'deg');
      card.style.setProperty('--ry', ry.toFixed(2)+'deg');
      card.style.setProperty('--mx', mx);
      card.style.setProperty('--my', my);
      card.style.transform = `perspective(600px) rotateX(${rx.toFixed(2)}deg) rotateY(${ry.toFixed(2)}deg) translateY(-4px) scale(1.015)`;
      card.style.transition = 'box-shadow .2s, background .2s, border-color .2s';
    } else {
      card.style.transform = '';
      card.style.transition = 'transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, background .2s, border-color .2s';
      card.style.setProperty('--rx','0deg');
      card.style.setProperty('--ry','0deg');
    }
  });
});

document.addEventListener('mouseleave', () => {
  glow.style.opacity='0'; glowVisible=false;
  document.querySelectorAll('.sheet-card').forEach(c => {
    c.style.transform='';
    c.style.setProperty('--rx','0deg');
    c.style.setProperty('--ry','0deg');
  });
});

// ── BUILD CARD ──
function buildCard(sheet) {
  const usage = getUsage()[sheet.id] || 0;
  const card = document.createElement('a');
  card.className = `sheet-card ${sheet.cat}`;
  card.href = sheet.url;
  card.target = '_blank';
  card.rel = 'noopener';
  card.dataset.id = sheet.id;
  card.dataset.name = sheet.name;
  card.dataset.cat = sheet.cat;

  const usageHTML = usage > 0
    ? `<span class="usage-badge has-usage"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> ${usage}×</span>`
    : `<span class="usage-badge"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> New</span>`;

  card.innerHTML = `
    <div class="card-accent ${sheet.cat}"></div>
    <div class="card-body">
      <div class="card-title">${sheet.name}</div>
      <div class="card-footer">
        ${usageHTML}
        <div class="open-arrow">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </div>
      </div>
    </div>`;

  card.addEventListener('click', () => { recordClick(sheet.id); setTimeout(renderAll, 120); });
  return card;
}

function renderAll() {
  ['gss','acc','lit','fan','ref'].forEach(cat => {
    const grid = document.getElementById('grid-' + cat);
    if (!grid) return;
    grid.innerHTML = '';
    SHEETS.filter(s => s.cat === cat).forEach(s => grid.appendChild(buildCard(s)));
  });
  renderFrequent();
}

function renderFrequent() {
  const data = getUsage();
  const sorted = Object.entries(data).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const section = document.getElementById('frequentSection');
  const list = document.getElementById('frequentList');
  if (!sorted.length) { section.style.display='none'; return; }
  section.style.display = 'block';
  list.innerHTML = '';
  sorted.forEach(([id, count]) => {
    const sheet = SHEETS.find(s => s.id===id);
    if (!sheet) return;
    const chip = document.createElement('a');
    chip.className = 'freq-chip';
    chip.href = sheet.url; chip.target='_blank'; chip.rel='noopener';
    chip.innerHTML = `<span>${CAT_ICONS[sheet.cat]}</span>${sheet.name}<span class="freq-count">${count}</span>`;
    chip.addEventListener('click', () => { recordClick(sheet.id); setTimeout(renderAll, 120); });
    list.appendChild(chip);
  });
}

// ── SEARCH ──
const searchInput   = document.getElementById('searchInput');
const clearBtn      = document.getElementById('clearSearch');
const searchResults = document.getElementById('searchResults');
const resultList    = document.getElementById('resultList');
const noResults     = document.getElementById('noResults');
const resultLabel   = document.getElementById('searchResultsLabel');
const catSections   = document.getElementById('categorySections');
const freqSection   = document.getElementById('frequentSection');

function doSearch(q) {
  if (!q) {
    searchResults.style.display='none'; catSections.style.display='block';
    clearBtn.style.display='none'; renderFrequent(); return;
  }
  clearBtn.style.display='block'; catSections.style.display='none';
  freqSection.style.display='none'; searchResults.style.display='block';
  const matches = SHEETS.filter(s => s.name.toLowerCase().includes(q.toLowerCase()));
  resultList.innerHTML='';
  if (!matches.length) { noResults.style.display='block'; resultLabel.textContent=''; }
  else {
    noResults.style.display='none';
    resultLabel.textContent = `${matches.length} result${matches.length>1?'s':''} for "${q}"`;
    matches.forEach(s => resultList.appendChild(buildCard(s)));
  }
}

searchInput.addEventListener('input', () => doSearch(searchInput.value.trim()));
clearBtn.addEventListener('click', () => { searchInput.value=''; doSearch(''); searchInput.focus(); });

// ── THEME ──
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeIcon').textContent  = t==='dark' ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = t==='dark' ? 'Dark' : 'Light';
  try { localStorage.setItem('sparkle_theme', t); } catch {}
}
document.getElementById('themeToggle').addEventListener('click', () => {
  applyTheme(document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark');
});
try {
  const saved = localStorage.getItem('sparkle_theme');
  if (saved) applyTheme(saved);
  else if (window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme('dark');
} catch {}

renderAll();
</script>
