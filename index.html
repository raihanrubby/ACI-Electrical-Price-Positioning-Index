<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACI Electrical — Price Positioning Index</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

[data-theme="light"] {
  --bg-a:#b8d4e8; --bg-b:#ddeaf8; --bg-c:#c5ddf2;
  --card-bg:rgba(255,255,255,0.52);
  --card-bg-h:rgba(255,255,255,0.82);
  --card-border:rgba(255,255,255,0.72);
  --card-border-h:rgba(255,255,255,0.96);
  --card-shadow:0 2px 12px rgba(21,96,130,0.10), 0 1px 3px rgba(21,96,130,0.06);
  --card-shadow-h:0 16px 40px rgba(21,96,130,0.18), 0 2px 8px rgba(21,96,130,0.10);
  --card-shine:rgba(255,255,255,0.70);
  --header-bg:rgba(210,232,248,0.72);
  --freq-bg:rgba(255,255,255,0.40);
  --text:#0b1e2d; --text-sec:#2e4f65; --text-muted:#6a8da6;
  --accent:#156082; --accent-lt:#6FAEFE;
  --search-bg:rgba(255,255,255,0.55);
  --toggle-bg:rgba(21,96,130,0.10);
  --orb1:rgba(21,96,130,0.18); --orb2:rgba(111,174,254,0.12);
  --cursor-clr:rgba(255,255,255,0.60);
}
[data-theme="dark"] {
  --bg-a:#030d16; --bg-b:#051525; --bg-c:#040f1c;
  --card-bg:rgba(255,255,255,0.06);
  --card-bg-h:rgba(255,255,255,0.12);
  --card-border:rgba(255,255,255,0.09);
  --card-border-h:rgba(255,255,255,0.20);
  --card-shadow:0 2px 12px rgba(0,0,0,0.40), 0 1px 3px rgba(0,0,0,0.30);
  --card-shadow-h:0 16px 40px rgba(0,0,0,0.60), 0 2px 8px rgba(0,0,0,0.40);
  --card-shine:rgba(255,255,255,0.09);
  --header-bg:rgba(3,13,25,0.75);
  --freq-bg:rgba(255,255,255,0.05);
  --text:#e2f0fa; --text-sec:#85b4cc; --text-muted:#4a7a9b;
  --accent:#6FAEFE; --accent-lt:#a8d4ff;
  --search-bg:rgba(255,255,255,0.07);
  --toggle-bg:rgba(111,174,254,0.10);
  --orb1:rgba(111,174,254,0.08); --orb2:rgba(21,96,130,0.14);
  --cursor-clr:rgba(111,174,254,0.22);
}

html { scroll-behavior:smooth; }

body {
  font-family:'Inter','Helvetica Neue',sans-serif;
  background:linear-gradient(140deg,var(--bg-a) 0%,var(--bg-b) 50%,var(--bg-c) 100%) fixed;
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  transition:background .4s,color .3s;
}

/* ── ORBS — GPU composited, no reflow ── */
.orb {
  position:fixed; border-radius:50%; pointer-events:none; z-index:0;
  will-change:transform;
  animation:drift 20s ease-in-out infinite alternate;
}
.orb1{width:600px;height:600px;top:-180px;right:-160px;background:radial-gradient(circle,var(--orb1),transparent 68%);filter:blur(50px);}
.orb2{width:480px;height:480px;bottom:-120px;left:-100px;background:radial-gradient(circle,var(--orb2),transparent 68%);filter:blur(45px);animation-duration:26s;animation-delay:-10s;}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(36px,28px)}}

/* ── CURSOR GLOW — single composited layer ── */
#cg{
  position:fixed;width:280px;height:280px;border-radius:50%;
  pointer-events:none;z-index:1;
  background:radial-gradient(circle,var(--cursor-clr) 0%,transparent 70%);
  transform:translate(-50%,-50%);
  will-change:transform;
  opacity:0;transition:opacity .3s;
  /* no filter blur here — use the gradient falloff instead */
}

/* ── HEADER — only element with backdrop-filter ── */
header{
  position:sticky;top:0;z-index:200;
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  background:var(--header-bg);
  border-bottom:1px solid var(--card-border);
  box-shadow:0 2px 24px rgba(21,96,130,0.10),inset 0 1px 0 var(--card-shine);
  transition:background .4s;
}
.hi{max-width:1200px;margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center;gap:16px;}
.logo{font-size:15px;font-weight:700;color:var(--text);flex-shrink:0;line-height:1.2;}
.logo span{display:block;font-size:10px;font-weight:400;color:var(--text-muted);letter-spacing:.9px;text-transform:uppercase;margin-top:2px;}
.hsp{flex:1;}

/* Search */
.sw{position:relative;}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;}
#searchInput{
  background:var(--search-bg);border:1px solid var(--card-border);border-radius:22px;
  padding:8px 34px 8px 34px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);
  width:210px;outline:none;
  transition:width .22s,border-color .2s,box-shadow .2s;
}
#searchInput:focus{width:260px;border-color:var(--accent);box-shadow:0 0 0 3px rgba(111,174,254,0.18);}
#searchInput::placeholder{color:var(--text-muted);}
#clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);display:none;padding:2px;line-height:0;}
#clr:hover{color:var(--text);}

/* Theme */
.tt{
  background:var(--toggle-bg);border:1px solid var(--card-border);border-radius:18px;
  padding:6px 13px;cursor:pointer;display:flex;align-items:center;gap:5px;
  font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--text-sec);
  white-space:nowrap;flex-shrink:0;transition:background .2s,transform .15s;
}
.tt:hover{background:var(--card-bg-h);transform:scale(1.03);}

/* ── MAIN ── */
main{max-width:1200px;margin:0 auto;padding:28px 32px 60px;position:relative;z-index:1;}

/* ── FREQUENT ── */
#fs{
  padding:18px 22px;margin-bottom:22px;display:none;
  background:var(--freq-bg);border:1px solid var(--card-border);border-left:3px solid var(--accent);
  border-radius:14px;box-shadow:var(--card-shadow);
}
#fs h2{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.4px;color:var(--text-muted);margin-bottom:10px;}
#fl{display:flex;flex-wrap:wrap;gap:7px;}
.fc{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;
  padding:5px 12px 5px 9px;font-size:12px;font-weight:500;color:var(--text);
  cursor:pointer;text-decoration:none;transition:background .15s,transform .12s,box-shadow .15s;
  contain:layout style;
}
.fc:hover{background:var(--accent);color:#fff;border-color:transparent;transform:translateY(-1px);box-shadow:0 6px 18px rgba(21,96,130,0.28);}
.fco{background:var(--accent);color:#fff;border-radius:9px;padding:1px 6px;font-size:10px;font-weight:700;}
.fc:hover .fco{background:rgba(255,255,255,0.25);}

/* ── CATEGORY ── */
.cs{margin-bottom:22px;}
.ch{margin-bottom:10px;padding-left:2px;}
.cp{
  display:inline-flex;align-items:center;gap:8px;padding:5px 14px 5px 9px;border-radius:8px;
  background:var(--card-bg);border:1px solid var(--card-border);
  box-shadow:var(--card-shadow);
}
.cd{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cn{font-size:11.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;}
.cc{font-size:10px;font-weight:700;padding:1px 7px;border-radius:9px;color:#fff;}

/* ── GRID ── */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;}

/* ── SHEET CARD
   NO backdrop-filter — use solid semi-transparent bg + shadows for glass look.
   Shine is a single pseudo-element moved via CSS var, GPU-composited.
── */
.sc{
  position:relative;overflow:hidden;display:flex;flex-direction:column;
  cursor:pointer;text-decoration:none;color:inherit;border-radius:14px;
  background:var(--card-bg);
  border:1px solid var(--card-border);
  box-shadow:var(--card-shadow);
  /* CSS vars for shine position */
  --mx:50%;--my:50%;
  transition:transform .2s cubic-bezier(.34,1.4,.64,1),
             box-shadow .2s,background .2s,border-color .2s;
  contain:layout style;
  will-change:transform;
}
/* Gloss top edge — static, no JS needed */
.sc::after{
  content:'';position:absolute;inset:0;border-radius:14px;
  background:linear-gradient(155deg,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0.04) 35%,transparent 60%);
  pointer-events:none;z-index:1;
}
/* Cursor shine — only visible on hover, moves with cursor */
.sc::before{
  content:'';position:absolute;inset:0;border-radius:14px;
  background:radial-gradient(circle at var(--mx) var(--my),rgba(255,255,255,0.45) 0%,rgba(255,255,255,0.08) 40%,transparent 68%);
  opacity:0;transition:opacity .2s;pointer-events:none;z-index:2;
}
.sc:hover{
  background:var(--card-bg-h);border-color:var(--card-border-h);
  box-shadow:var(--card-shadow-h);
  transform:translateY(-5px) scale(1.015);
}
.sc:hover::before{opacity:1;}
.sc:active{transform:translateY(-1px) scale(1.005);transition-duration:.08s;}

.ca{height:3px;flex-shrink:0;}
.cb{padding:13px 15px 12px;display:flex;flex-direction:column;gap:9px;flex:1;position:relative;z-index:3;}
.ct{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.35;}
.cf{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.ub{display:flex;align-items:center;gap:3px;font-size:10px;font-weight:500;color:var(--text-muted);}
.ub.hu{color:var(--accent);}
.oa{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:7px;
  background:var(--card-bg);border:1px solid var(--card-border);color:var(--text-muted);
  transition:background .15s,color .15s,border-color .15s,transform .15s;flex-shrink:0;
}
.sc:hover .oa{background:var(--cat-color,#156082);border-color:transparent;color:#fff;transform:translate(1px,-1px);}

/* ── SEARCH ── */
#sr{display:none;}
.rl{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;}
#srl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:10px;}
.nr{text-align:center;padding:50px 20px;color:var(--text-muted);font-size:14px;}
.nr svg{margin-bottom:12px;opacity:.3;}

/* ── CAT COLORS ── */
.gss{--cat-color:#156082;} .acc{--cat-color:#242867;} .lit{--cat-color:#1c6b5e;} .fan{--cat-color:#4e6688;} .ref{--cat-color:#7a6530;}
.cd.gss{background:#156082;} .cd.acc{background:#242867;} .cd.lit{background:#1c6b5e;} .cd.fan{background:#4e6688;} .cd.ref{background:#7a6530;}
.cn.gss{color:#156082;} .cn.acc{color:#242867;} .cn.lit{color:#1c6b5e;} .cn.fan{color:#4e6688;} .cn.ref{color:#7a6530;}
[data-theme="dark"] .cn.gss{color:#6FAEFE;} [data-theme="dark"] .cn.acc{color:#9491ff;} [data-theme="dark"] .cn.lit{color:#5ecfb8;} [data-theme="dark"] .cn.fan{color:#8bafd4;} [data-theme="dark"] .cn.ref{color:#d4b76a;}
.cc.gss{background:#156082;} .cc.acc{background:#242867;} .cc.lit{background:#1c6b5e;} .cc.fan{background:#4e6688;} .cc.ref{background:#7a6530;}
.ca.gss{background:linear-gradient(90deg,#156082,#6FAEFE);} .ca.acc{background:linear-gradient(90deg,#242867,#7a73d1);} .ca.lit{background:linear-gradient(90deg,#1c6b5e,#5ecfb8);} .ca.fan{background:linear-gradient(90deg,#4e6688,#8bafd4);} .ca.ref{background:linear-gradient(90deg,#7a6530,#d4b76a);}

footer{text-align:center;padding:16px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--card-border);position:relative;z-index:1;}

@media(max-width:640px){
  .hi{padding:0 14px;gap:8px;}
  main{padding:16px 12px 44px;}
  #searchInput{width:140px;} #searchInput:focus{width:180px;}
  .tt span{display:none;}
}
</style>
</head>

  {id:'0JYBRvAa6xzRc3ZdVb-6ueW_vic_UA5_51UG6hk9WWA',name:'Prime Series Price Positioning',cat:'lit',url:'https://docs.google.com/spreadsheets/d/10JYBRvAa6xzRc3ZdVb-6ueW_vic_UA5_51UG6hk9WWA/edit'},
  {id:'viv-MCoDQ6A_3oubLOky4e-NDZ--YKuvZmwfoxG0SKw',name:'Exhaust Fan Price Positioning',cat:'fan',url:'https://docs.google.com/spreadsheets/d/1viv-MCoDQ6A_3oubLOky4e-NDZ--YKuvZmwfoxG0SKw/edit'},
  {id:'5zkYuuE8rn5_RwdzYC2NTSwFsEGvA74mnc1bmS9crL4',name:'Mosquito Bat Price Positioning',cat:'fan',url:'https://docs.google.com/spreadsheets/d/15zkYuuE8rn5_RwdzYC2NTSwFsEGvA74mnc1bmS9crL4/edit'},
  {id:'U4CqxuR1xwW4tfyb9nauZmuUtnRpjTXLHmamo5VoT6k',name:'RDF Price Positioning',cat:'fan',url:'https://docs.google.com/spreadsheets/d/1U4CqxuR1xwW4tfyb9nauZmuUtnRpjTXLHmamo5VoT6k/edit'},
  {id:'BcSPz_vH2LrG7bzCwKkVF1Ztzp0rBaKJvwMQYCvex0A',name:'Probable COGS FY2026-27',cat:'ref',url:'https://docs.google.com/spreadsheets/d/1BcSPz_vH2LrG7bzCwKkVF1Ztzp0rBaKJvwMQYCvex0A/edit'},
  {id:'vr8VY2k8vB0X9Uq-MPCgierWqvTUu-VjraavBhBmWZs',name:'Source File',cat:'ref',url:'https://docs.google.com/spreadsheets/d/1vr8VY2k8vB0X9Uq-MPCgierWqvTUu-VjraavBhBmWZs/edit'},
];

const SK='sparkle_pp_v3';
const CAT_ICONS={gss:'🔌',acc:'⚙️',lit:'💡',fan:'🌀',ref:'📁'};
function getU(){try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return{}}}
function saveU(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch{}}
function recClick(id){const d=getU();d[id]=(d[id]||0)+1;saveU(d);}

/* ── CURSOR GLOW — RAF throttled, only moves the glow element ── */
const cgEl=document.getElementById('cg');
let rafId=null,cx=0,cy=0,cgOn=false;
document.addEventListener('mousemove',e=>{
  cx=e.clientX;cy=e.clientY;
  if(!rafId)rafId=requestAnimationFrame(moveCG);
  if(!cgOn){cgEl.style.opacity='1';cgOn=true;}
},{passive:true});
document.addEventListener('mouseleave',()=>{cgEl.style.opacity='0';cgOn=false;});
function moveCG(){
  cgEl.style.left=cx+'px';
  cgEl.style.top=cy+'px';
  rafId=null;
}

/* ── PER-CARD SHINE — only track mouse inside hovered card ── */
let activeCard=null;
function onCardMove(e){
  if(!activeCard)return;
  const r=activeCard.getBoundingClientRect();
  const mx=((e.clientX-r.left)/r.width*100).toFixed(1)+'%';
  const my=((e.clientY-r.top)/r.height*100).toFixed(1)+'%';
  activeCard.style.setProperty('--mx',mx);
  activeCard.style.setProperty('--my',my);
}
// Delegate to document — single listener
document.addEventListener('mousemove',onCardMove,{passive:true});

/* ── BUILD CARD ── */
function buildCard(s){
  const u=getU()[s.id]||0;
  const a=document.createElement('a');
  a.className=`sc ${s.cat}`;
  a.href=s.url;a.target='_blank';a.rel='noopener';
  a.dataset.id=s.id;
  const ub=u>0?`<span class="ub hu"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> ${u}×</span>`
              :`<span class="ub"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> New</span>`;
  a.innerHTML=`<div class="ca ${s.cat}"></div><div class="cb"><div class="ct">${s.name}</div><div class="cf">${ub}<div class="oa"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></div></div></div>`;
  a.addEventListener('mouseenter',()=>{activeCard=a;});
  a.addEventListener('mouseleave',()=>{if(activeCard===a)activeCard=null;});
  a.addEventListener('click',()=>{recClick(s.id);setTimeout(renderAll,200);});
  return a;
}

function renderAll(){
  ['gss','acc','lit','fan','ref'].forEach(cat=>{
    const g=document.getElementById('g-'+cat);if(!g)return;
    const frag=document.createDocumentFragment();
    SHEETS.filter(s=>s.cat===cat).forEach(s=>frag.appendChild(buildCard(s)));
    g.innerHTML='';g.appendChild(frag);
  });
  renderFreq();
}

function renderFreq(){
  const d=getU();
  const sorted=Object.entries(d).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const sec=document.getElementById('fs'),list=document.getElementById('fl');
  if(!sorted.length){sec.style.display='none';return;}
  sec.style.display='block';list.innerHTML='';
  const frag=document.createDocumentFragment();
  sorted.forEach(([id,cnt])=>{
    const s=SHEETS.find(x=>x.id===id);if(!s)return;
    const c=document.createElement('a');
    c.className='fc';c.href=s.url;c.target='_blank';c.rel='noopener';
    c.innerHTML=`<span>${CAT_ICONS[s.cat]}</span>${s.name}<span class="fco">${cnt}</span>`;
    c.addEventListener('click',()=>{recClick(s.id);setTimeout(renderAll,200);});
    frag.appendChild(c);
  });
  list.appendChild(frag);
}

/* ── SEARCH ── */
const searchEl=document.getElementById('searchInput');
const clrBtn=document.getElementById('clr');
const srEl=document.getElementById('sr');
const rlEl=document.getElementById('rl');
const nrEl=document.getElementById('nr');
const srlEl=document.getElementById('srl');
const catsEl=document.getElementById('cats');
const fsEl=document.getElementById('fs');

function doSearch(q){
  if(!q){
    srEl.style.display='none';catsEl.style.display='block';
    clrBtn.style.display='none';renderFreq();return;
  }
  clrBtn.style.display='block';catsEl.style.display='none';fsEl.style.display='none';
  srEl.style.display='block';
  const m=SHEETS.filter(s=>s.name.toLowerCase().includes(q.toLowerCase()));
  rlEl.innerHTML='';
  if(!m.length){nrEl.style.display='block';srlEl.textContent='';}
  else{
    nrEl.style.display='none';
    srlEl.textContent=`${m.length} result${m.length>1?'s':''} for "${q}"`;
    const frag=document.createDocumentFragment();
    m.forEach(s=>frag.appendChild(buildCard(s)));
    rlEl.appendChild(frag);
  }
}

searchEl.addEventListener('input',()=>doSearch(searchEl.value.trim()));
clrBtn.addEventListener('click',()=>{searchEl.value='';doSearch('');searchEl.focus();});

/* ── THEME ── */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('ti').textContent=t==='dark'?'🌙':'☀️';
  document.getElementById('tl').textContent=t==='dark'?'Dark':'Light';
  try{localStorage.setItem('sparkle_theme',t)}catch{}
}
document.getElementById('tt').addEventListener('click',()=>{
  applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
});
try{
  const saved=localStorage.getItem('sparkle_theme');
  if(saved)applyTheme(saved);
  else if(window.matchMedia('(prefers-color-scheme: dark)').matches)applyTheme('dark');
}catch{}

renderAll();
</script>
